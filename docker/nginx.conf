server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers (complements the API-side headers)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Disable nginx version disclosure
    server_tokens off;

    # No caching for index.html so users always get the latest SPA build
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
    }

    # Cache static assets (JS/CSS bundles have content-hash in filenames)
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
