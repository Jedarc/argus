services:
  postgres:
    container_name: argus-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - argus-postgres-data:/var/lib/postgresql/data
    networks:
      - argus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    ulimits:
      nofile:
        soft: 1024
        hard: 4096

  redis:
    container_name: argus-redis
    image: redis:7-alpine
    restart: unless-stopped
    # Two Redis databases used:
    #   /1 — Celery broker (task queue)
    #   /2 — Celery result backend
    # Prefixing all keys and using named DBs prevents collisions when
    # this Redis instance is shared or accessible from other services.
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    networks:
      - argus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 192M
        reservations:
          cpus: "0.1"
          memory: 64M

  api:
    container_name: argus-api
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - argus-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    ulimits:
      nofile:
        soft: 4096
        hard: 8192

  worker:
    container_name: argus-worker
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    networks:
      - argus-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
      nproc:
        soft: 256
        hard: 512

  ui:
    container_name: argus-ui
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - argus-network
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 32M

networks:
  argus-network:
    name: argus-network
    driver: bridge

volumes:
  argus-postgres-data:
    name: argus-postgres-data
