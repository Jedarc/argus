services:
  api:
    container_name: argus-api
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: development
    volumes:
      - ./src/api:/app/api
    command: sh -c "alembic -c api/alembic.ini upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M

  worker:
    container_name: argus-worker
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
      target: development
    volumes:
      - ./src/api:/app/api
    command: celery -A api.tasks worker --loglevel=debug --queues=argus.default,argus.dlq
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    ulimits:
      nproc:
        soft: 256
        hard: 512

  ui:
    container_name: argus-ui
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      target: development
    volumes:
      - ./src/ui:/app
      - /app/node_modules
    ports:
      - "3000:5173"
    command: npm run dev -- --host
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
