[alembic]
script_location = api/alembic
# Container layout: WORKDIR=/app, api package at /app/api/, alembic.ini at /app/api/alembic.ini.
# prepend_sys_path is relative to the alembic.ini location, so ".." resolves to /app/,
# making "from api.database import Base" resolvable.
prepend_sys_path = ..
version_path_separator = os

# URL is set dynamically in env.py via DATABASE_URL environment variable.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
