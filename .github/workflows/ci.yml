name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/api/
      - run: ruff format --check src/api/

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: ci-test-secret-key-minimum-32-chars!
      DATABASE_URL: postgresql://test:test@localhost/test
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/api/requirements.txt pytest pytest-cov
      - name: Run tests
        run: pytest tests/ --cov=src/api --cov-report=term-missing

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.example .env
      - name: Build all images
        run: docker compose build
